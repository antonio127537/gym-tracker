<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>Gym Tracker Pro</title><style>body{margin:0;font-family:-apple-system;background:#0f172a;color:white}header{background:#111827;padding:18px;text-align:center;font-size:28px;font-weight:bold;position:sticky;top:0}.container{padding:15px}.card{background:#1e293b;border-radius:18px;padding:15px;margin-bottom:18px}.exercise{background:#334155;padding:12px;border-radius:14px;margin-bottom:10px}input,textarea{width:100%;padding:10px;margin-top:8px;border:none;border-radius:10px;box-sizing:border-box}button{border:none;padding:12px;border-radius:12px;font-size:16px;font-weight:bold;margin-top:10px}.primary{background:#3b82f6;color:white;width:100%}.green{background:#22c55e;color:white}.red{background:#ef4444;color:white}</style></head><body><header>🏋️ Gym Tracker Pro</header><div class='container' id='app'></div><script>let rutina=JSON.parse(localStorage.getItem('rutina'))||{'Lunes':['Prensa inclinada','Sentadilla hack'],'Martes':['Press inclinado','Elevaciones laterales']};function render(){const app=document.getElementById('app');app.innerHTML='';Object.entries(rutina).forEach(([dia,ejercicios])=>{const card=document.createElement('div');card.className='card';let html='<h2>'+dia+'</h2>';ejercicios.forEach((ej,i)=>{html+=`<div class='exercise'><input value='${ej}' onchange="changeExercise('${dia}',${i},this.value)"><input placeholder='Peso'><input placeholder='Reps'><textarea placeholder='Notas'></textarea><button class='green'>Guardar</button></div>`});html+=`<button class='primary' onclick="addExercise('${dia}')">+ Agregar ejercicio</button>`;card.innerHTML=html;app.appendChild(card);});}function addExercise(day){const name=prompt('Nombre del ejercicio');if(!name)return;rutina[day].push(name);saveRoutine();render();}function changeExercise(day,index,value){rutina[day][index]=value;saveRoutine();}function saveRoutine(){localStorage.setItem('rutina',JSON.stringify(rutina));}render();</script></body></html>
